    - term: industry rivalry
      zh-CN: "行业竞争"

double_diamond:
  name: Double Diamond
  aliases: [diverge-converge model, design process model]
  origin: British Design Council
  key_concepts:
    - term: diverge
      zh-CN: "发散"
    - term: converge
      zh-CN: "收敛"
    - term: discover
      zh-CN: "发现"
    - term: define
      zh-CN: "定义"

occams_razor:
  name: Occam's Razor
  aliases: [Ockham's razor, principle of parsimony, economy principle]
  origin: William of Ockham
  key_concepts:
    - term: simplest hypothesis
      zh-CN: "最简假设"
    - term: economy of entities
      zh-CN: "实体经济"
    - term: razor principle
      zh-CN: "剃刀原理"
