  key_concepts:
    - term: assume failure
      zh-CN: "假设失败"
    - term: reverse-engineer causes
      zh-CN: "反推死因"
    - term: early warning signals
      zh-CN: "前兆信号"

five_forces:
  name: Porter's Five Forces
  aliases: [five forces analysis, five forces model, competitive forces]
