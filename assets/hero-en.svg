<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Menlo, Monaco, 'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="540" rx="12" fill="url(#bg)"/>

  <!-- Window buttons -->
  <circle cx="24" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="48" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="72" cy="20" r="6" fill="#27c93f"/>

  <!-- Terminal prompt -->
  <text x="24" y="60" fill="#10b981" font-size="14">$</text>
  <text x="44" y="60" fill="#e2e8f0" font-size="14">npx skills add peterfei/forge-skill-first-principles-skill</text>

  <!-- Pipeline -->
  <rect x="24" y="80" width="100" height="32" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="32" y="100" fill="#94a3b8" font-size="11">Phase 0</text>
  <text x="78" y="100" fill="#e2e8f0" font-size="11">Route</text>

  <line x1="124" y1="96" x2="148" y2="96" stroke="#475569" stroke-width="2"/>
  <polygon points="148,92 156,96 148,100" fill="#475569"/>

  <rect x="160" y="80" width="140" height="32" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="168" y="100" fill="#94a3b8" font-size="11">Phase 1</text>
  <text x="224" y="100" fill="#8b5cf6" font-size="11">6-Way Collection</text>

  <text x="310" y="92" fill="#64748b" font-size="9">┌─ A1 Literature</text>
  <text x="310" y="105" fill="#64748b" font-size="9">├─ A2 Case Studies</text>
  <text x="310" y="118" fill="#64748b" font-size="9">├─ A3 Critiques</text>

  <line x1="300" y1="96" x2="414" y2="96" stroke="#475569" stroke-width="2"/>
  <polygon points="414,92 422,96 414,100" fill="#475569"/>

  <rect x="426" y="80" width="130" height="32" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="434" y="100" fill="#94a3b8" font-size="11">Phase 2</text>
  <text x="490" y="100" fill="#f59e0b" font-size="11">Extract</text>

  <line x1="556" y1="96" x2="580" y2="96" stroke="#475569" stroke-width="2"/>
  <polygon points="580,92 588,96 580,100" fill="#475569"/>

  <rect x="594" y="80" width="110" height="32" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="602" y="100" fill="#94a3b8" font-size="11">Phase 3</text>
  <text x="654" y="100" fill="#06b6d4" font-size="11">Build</text>

  <line x1="704" y1="96" x2="728" y2="96" stroke="#475569" stroke-width="2"/>
  <polygon points="728,92 736,96 728,100" fill="#475569"/>

  <rect x="742" y="80" width="110" height="32" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="750" y="100" fill="#94a3b8" font-size="11">Phase 4</text>
  <text x="802" y="100" fill="#22c55e" font-size="11">Validate</text>

  <!-- Output panel -->
  <rect x="24" y="140" width="852" height="360" rx="4" fill="rgba(15,23,42,0.6)" stroke="#334155" stroke-width="1"/>

  <text x="40" y="170" fill="#64748b" font-size="11">═══════════════════════════  Skill Forged  ═══════════════════════════</text>

  <text x="40" y="200" fill="#94a3b8" font-size="11">name:</text>
  <text x="90" y="200" fill="#f97316" font-size="11" font-weight="bold">first-principles-skill</text>

  <text x="40" y="220" fill="#64748b" font-size="11">──────────────────────────────────────────────────────────────</text>

  <text x="40" y="248" fill="#94a3b8" font-size="11">Core Principles</text>
  <text x="160" y="248" fill="#22c55e" font-size="11">4</text>
  <text x="210" y="248" fill="#94a3b8" font-size="11">Cross-Domain Evidence</text>
  <text x="370" y="248" fill="#22c55e" font-size="11">14 proofs</text>

  <text x="40" y="276" fill="#e2e8f0" font-size="11">1. Reduce to Fundamental Truths</text>
  <text x="300" y="276" fill="#64748b" font-size="11">&lt;- Aristotle · Descartes · Musk</text>
  <text x="40" y="298" fill="#e2e8f0" font-size="11">2. Separate Known from Assumed</text>
  <text x="300" y="298" fill="#64748b" font-size="11">&lt;- Descartes · Popper · Galileo</text>
  <text x="40" y="320" fill="#e2e8f0" font-size="11">3. Reason Up from Fundamentals</text>
  <text x="300" y="320" fill="#64748b" font-size="11">&lt;- Bezos · Satoshi · Musk</text>
  <text x="40" y="342" fill="#e2e8f0" font-size="11">4. Beware of the Analogy Trap</text>
  <text x="300" y="342" fill="#64748b" font-size="11">&lt;- Jobs · Pinker · Hofstadter</text>

  <text x="40" y="376" fill="#64748b" font-size="11">──────────────────────────────────────────────────────────────</text>

  <text x="40" y="404" fill="#94a3b8" font-size="11">Applies To</text>
  <text x="120" y="404" fill="#e2e8f0" font-size="11">Tech Innovation ✓</text>
  <text x="260" y="404" fill="#e2e8f0" font-size="11">Business Strategy ✓</text>
  <text x="400" y="404" fill="#e2e8f0" font-size="11">Career Decisions ✓</text>

  <text x="40" y="428" fill="#94a3b8" font-size="11">Not For</text>
  <text x="120" y="428" fill="#64748b" font-size="11">Daily Ops ✗</text>
  <text x="260" y="428" fill="#64748b" font-size="11">Emotional Issues ✗</text>

  <text x="40" y="462" fill="#64748b" font-size="11">──────────────────────────────────────────────────────────────</text>

  <text x="40" y="490" fill="#22c55e" font-size="11" filter="url(#glow)">✓ Quality Check 6/6 Passed</text>
  <text x="260" y="490" fill="#a78bfa" font-size="11" filter="url(#glow)">✓ Primary Sources 75%+</text>
  <text x="460" y="490" fill="#f59e0b" font-size="11" filter="url(#glow)">✓ Dual-Agent Refined</text>

  <!-- Logo text at top-right -->
  <text x="740" y="38" fill="url(#accent)" font-size="16" font-weight="bold" filter="url(#glow)">
    forge-skill
  </text>

  <!-- Left accent bar -->
  <rect x="8" y="80" width="4" height="40" rx="2" fill="url(#accent)" opacity="0.6"/>
  <rect x="8" y="140" width="4" height="360" rx="2" fill="url(#accent)" opacity="0.3"/>
</svg>