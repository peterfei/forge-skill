<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="anvilGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="60%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="40" fill="url(#bgGrad)"/>

  <!-- Ambient forge glow behind anvil -->
  <ellipse cx="260" cy="280" rx="100" ry="90" fill="#f97316" opacity="0.08" filter="url(#glowStrong)"/>

  <!-- === ANVIL Silhouette (solid fill, single path) === -->
  <path d="
    M 170 368
    L 325 368
    C 333 340, 326 315, 318 295
    L 308 270
    C 314 230, 311 208, 310 195
    L 310 188
    C 332 168, 355 150, 372 138
    C 378 142, 374 152, 362 162
    C 340 178, 318 195, 306 200
    C 300 202, 295 202, 290 202
    L 210 202
    C 207 240, 198 280, 193 310
    C 188 340, 182 358, 170 368
    Z
  " fill="url(#anvilGrad)"/>

  <!-- Top face (flat working surface highlight) -->
  <path d="M 208 202 L 290 202" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Face highlight (forge strike zone) -->
  <path d="M 272 215 C 278 230, 278 260, 275 275" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.2"/>

  <!-- Left heel corner highlight -->
  <path d="M 210 200 C 207 210, 203 218, 200 230" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.15"/>

  <!-- === SPARK === -->
  <g filter="url(#glow)">
    <!-- Main star -->
    <path d="M 248 108
             L 252 128 L 272 132 L 252 136 L 248 156 L 244 136 L 224 132 L 244 128 Z"
          fill="url(#sparkGrad)"/>

    <!-- Upper accent spark -->
    <path d="M 248 88 L 250 98 L 260 100 L 250 102 L 248 112 L 246 102 L 236 100 L 246 98 Z"
          fill="#fef08a" opacity="0.6"/>

    <!-- Spark fragments -->
    <circle cx="214" cy="118" r="3" fill="#fbbf24" opacity="0.8"/>
    <circle cx="282" cy="112" r="2.5" fill="#fbbf24" opacity="0.7"/>
    <circle cx="238" cy="82" r="1.5" fill="#fef08a" opacity="0.5"/>
    <circle cx="260" cy="78" r="2" fill="#fef08a" opacity="0.5"/>

    <!-- Impact lines -->
    <line x1="195" y1="125" x2="182" y2="115" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="192" y1="138" x2="178" y2="138" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="198" y1="150" x2="186" y2="158" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

    <line x1="305" y1="120" x2="318" y2="110" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="308" y1="135" x2="320" y2="132" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Forge impact marker (bottom) -->
  <path d="M 245 390 L 248 380 L 248 395 Z" fill="#fbbf24" opacity="0.3"/>
  <path d="M 254 392 L 256 384 L 256 397 Z" fill="#fbbf24" opacity="0.25"/>
</svg>
